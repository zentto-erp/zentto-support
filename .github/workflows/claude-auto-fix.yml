name: Forward to Dev

on:
  issues:
    types: [labeled]

permissions:
  contents: read

jobs:
  forward-to-dev:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Acknowledge ticket
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Ticket registrado. El equipo tecnico ha sido notificado.'
            });

      - name: Create issue on zentto-web and link back
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const supportUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${context.issue.number}`;
            const labels = context.payload.issue.labels.map(l => l.name).join(', ') || 'ninguna';

            const issue = await github.rest.issues.create({
              owner: 'zentto-erp',
              repo: 'zentto-web',
              title: `[Support #${context.issue.number}] ${context.payload.issue.title}`,
              body: [
                `## Origen: [Support Ticket #${context.issue.number}](${supportUrl})`,
                '',
                '## Descripcion del ticket',
                context.payload.issue.body || '_Sin descripcion_',
                '',
                `**Etiquetas originales:** ${labels}`,
                '',
                '---',
                '_Issue creado automaticamente desde el repositorio de soporte._'
              ].join('\n'),
              labels: ['support', 'pending-fix']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Issue tecnico creado: [zentto-web#${issue.data.number}](${issue.data.html_url})`
            });

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['estado:en-revision']
            });
