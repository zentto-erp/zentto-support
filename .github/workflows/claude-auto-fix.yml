name: Claude Auto-Fix

on:
  issues:
    types: [labeled]

jobs:
  analyze-and-fix:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment — Analyzing
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 **Claude está analizando este ticket...**\n\nRevisando el código fuente para encontrar una solución.'
            });

      - name: Checkout zentto-web
        uses: actions/checkout@v4
        with:
          repository: zentto-erp/zentto-web
          token: ${{ secrets.GH_PAT }}
          path: zentto-web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Analyze with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
        run: |
          cd zentto-web
          node << 'SCRIPT'
          const https = require("https");
          const fs = require("fs");
          const path = require("path");

          const labels = (process.env.ISSUE_LABELS || "").split(",");
          const mod = labels.find(l => l.startsWith("modulo:"))?.replace("modulo:", "") || "";
          const type = labels.includes("feature") ? "feature" : labels.includes("question") ? "question" : "bug";

          let context = "";
          if (mod) {
            const apiDir = "web/api/src/modules/" + mod;
            if (fs.existsSync(apiDir)) {
              context += "\n--- API MODULE: " + mod + " ---\n";
              fs.readdirSync(apiDir).filter(f => f.endsWith(".ts")).slice(0, 5).forEach(f => {
                context += "\n--- " + f + " ---\n" + fs.readFileSync(path.join(apiDir, f), "utf8").split("\n").slice(0, 100).join("\n");
              });
            }
            const feDir = "web/modular-frontend/packages/module-" + mod + "/src/components";
            if (fs.existsSync(feDir)) {
              context += "\n--- FRONTEND ---\n";
              fs.readdirSync(feDir).filter(f => f.endsWith(".tsx")).slice(0, 3).forEach(f => {
                context += "\n--- " + f + " ---\n" + fs.readFileSync(path.join(feDir, f), "utf8").split("\n").slice(0, 80).join("\n");
              });
            }
          }
          if (!context) {
            try { context = "API modules: " + fs.readdirSync("web/api/src/modules").join(", "); } catch {}
          }

          const prompt = [
            "You are a senior developer for Zentto ERP.",
            "Title: " + process.env.ISSUE_TITLE,
            "Body:\n" + process.env.ISSUE_BODY,
            "Type: " + type + " | Module: " + (mod || "general"),
            "Context:\n" + context,
            "",
            "Provide: 1) Root cause 2) Affected files 3) Solution 4) Risk level 5) Effort",
            "Respond in Spanish."
          ].join("\n\n");

          const body = JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 4096,
            messages: [{ role: "user", content: prompt }]
          });

          const req = https.request({
            hostname: "api.anthropic.com",
            path: "/v1/messages",
            method: "POST",
            headers: {
              "x-api-key": process.env.ANTHROPIC_API_KEY,
              "anthropic-version": "2023-06-01",
              "content-type": "application/json",
            }
          }, res => {
            let data = "";
            res.on("data", c => data += c);
            res.on("end", () => {
              try {
                const text = JSON.parse(data).content[0].text;
                fs.writeFileSync("/tmp/analysis.txt", text);
              } catch (e) {
                fs.writeFileSync("/tmp/analysis.txt", "Error: " + e.message + "\nRaw: " + data.substring(0, 500));
              }
            });
          });
          req.on("error", e => fs.writeFileSync("/tmp/analysis.txt", "API error: " + e.message));
          req.write(body);
          req.end();
          SCRIPT

      - name: Post analysis comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let analysis = 'Error: analysis not generated';
            try { analysis = fs.readFileSync('/tmp/analysis.txt', 'utf8').trim(); } catch {}
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🤖 Análisis de Claude\n\n' + analysis + '\n\n---\n### Próximos pasos\n- Agrega `ai-pr` para que Claude cree un PR con el fix\n- O asigna manualmente a un desarrollador'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['estado:en-revision']
            });

  create-pr:
    if: github.event.label.name == 'ai-pr'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Comment — Creating PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🔧 **Claude está creando un PR con la solución...**'
            });

      - name: Checkout zentto-web
        uses: actions/checkout@v4
        with:
          repository: zentto-erp/zentto-web
          token: ${{ secrets.GH_PAT }}
          ref: developer
          path: zentto-web

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get analysis from comments
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const analysis = comments.data
              .filter(c => c.body.includes('Análisis de Claude'))
              .map(c => c.body).join('\n');
            core.setOutput('analysis', analysis);
            core.setOutput('title', context.payload.issue.title);
            core.setOutput('body', context.payload.issue.body);
            core.setOutput('number', String(context.payload.issue.number));

      - name: Generate fix
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ steps.ctx.outputs.title }}
          ISSUE_BODY: ${{ steps.ctx.outputs.body }}
          ISSUE_NUMBER: ${{ steps.ctx.outputs.number }}
          ANALYSIS: ${{ steps.ctx.outputs.analysis }}
        run: |
          cd zentto-web
          BRANCH="fix/support-issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"

          node << 'SCRIPT'
          const https = require("https");
          const fs = require("fs");
          const path = require("path");

          const prompt = [
            "Implement a fix for Zentto ERP.",
            "Issue: " + process.env.ISSUE_TITLE,
            "Analysis: " + process.env.ANALYSIS,
            "",
            'Output ONLY valid JSON: {"files": [{"path": "relative/path", "action": "create|modify", "content": "full content"}]}',
            'If cannot fix, return: {"files": [], "reason": "explanation"}'
          ].join("\n");

          const body = JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 8192,
            messages: [{ role: "user", content: prompt }]
          });

          const req = https.request({
            hostname: "api.anthropic.com",
            path: "/v1/messages",
            method: "POST",
            headers: {
              "x-api-key": process.env.ANTHROPIC_API_KEY,
              "anthropic-version": "2023-06-01",
              "content-type": "application/json",
            }
          }, res => {
            let data = "";
            res.on("data", c => data += c);
            res.on("end", () => {
              try {
                const text = JSON.parse(data).content[0].text;
                const match = text.match(/\{[\s\S]*\}/);
                if (!match) { fs.writeFileSync("/tmp/has_changes", "false"); return; }
                const changes = JSON.parse(match[0]);
                if (!changes.files || changes.files.length === 0) {
                  fs.writeFileSync("/tmp/has_changes", "false");
                  return;
                }
                for (const file of changes.files) {
                  if (file.action === "delete" && fs.existsSync(file.path)) {
                    fs.unlinkSync(file.path);
                  } else {
                    fs.mkdirSync(path.dirname(file.path), { recursive: true });
                    fs.writeFileSync(file.path, file.content);
                  }
                  console.log(file.action + ": " + file.path);
                }
                fs.writeFileSync("/tmp/has_changes", "true");
              } catch (e) {
                console.log("Error: " + e.message);
                fs.writeFileSync("/tmp/has_changes", "false");
              }
            });
          });
          req.on("error", () => fs.writeFileSync("/tmp/has_changes", "false"));
          req.write(body);
          req.end();
          SCRIPT

          sleep 10
          HAS=$(cat /tmp/has_changes 2>/dev/null || echo "false")
          if [ "$HAS" = "true" ]; then
            git add -A
            git commit -m "fix: resolve support issue #${ISSUE_NUMBER}"
            git push origin "$BRANCH"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Draft PR
        if: steps.gen.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const branch = '${{ steps.gen.outputs.branch }}';
            const num = ${{ steps.ctx.outputs.number }};
            const title = `${{ steps.ctx.outputs.title }}`;
            const pr = await github.rest.pulls.create({
              owner: 'zentto-erp', repo: 'zentto-web',
              title: `fix: ${title} (support #${num})`,
              body: `## Support #${num}\n\n> ⚠️ PR generada automáticamente. Revisar antes de mergear.`,
              head: branch, base: 'developer', draft: true,
            });
            await github.rest.issues.createComment({
              owner: 'zentto-erp', repo: 'zentto-support', issue_number: num,
              body: `✅ **PR:** [zentto-web#${pr.data.number}](${pr.data.html_url}) (draft)`
            });
            await github.rest.issues.addLabels({
              owner: 'zentto-erp', repo: 'zentto-support', issue_number: num,
              labels: ['ai-pr']
            });

      - name: No changes
        if: steps.gen.outputs.has_changes != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ Claude no pudo generar un fix automático. Asignar manualmente.'
            });
